<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>wAI Operations Ledger Control Desk</title>
  <style>
    :root {
      --bg: #f4f6fa;
      --surface: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --warn-bg: #fef3c7;
      --warn-fg: #b45309;
      --warn-border: #f59e0b;
      --ok-bg: #d1fae5;
      --ok-fg: #047857;
      --ok-border: #10b981;
      --shadow: 0 1px 2px rgba(16, 24, 40, 0.04), 0 4px 16px rgba(16, 24, 40, 0.06);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
                   Cantarell, "Helvetica Neue", Arial, sans-serif;
      font-size: 15px;
      line-height: 1.45;
    }

    header.banner {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #fff;
      padding: 28px 32px;
      box-shadow: var(--shadow);
    }

    header.banner h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    header.banner p {
      margin: 6px 0 0;
      color: #cbd5e1;
      font-size: 13px;
    }

    main {
      max-width: 1080px;
      margin: 32px auto;
      padding: 0 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 24px;
    }

    .card h2 {
      margin: 0 0 4px;
      font-size: 16px;
      font-weight: 600;
    }

    .card .subtitle {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 13px;
    }

    .grid {
      width: 100%;
      border-collapse: collapse;
    }

    .grid thead th {
      text-align: left;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: #f9fafb;
    }

    .grid tbody td {
      padding: 16px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      font-size: 14px;
    }

    .grid tbody tr:last-child td { border-bottom: none; }

    .grid td.balance {
      font-variant-numeric: tabular-nums;
      font-weight: 600;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .badge.warn {
      background: var(--warn-bg);
      color: var(--warn-fg);
      border-color: var(--warn-border);
    }

    .badge.ok {
      background: var(--ok-bg);
      color: var(--ok-fg);
      border-color: var(--ok-border);
    }

    .badge .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      margin-top: 18px;
    }

    button.cta {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: background 0.15s ease, transform 0.05s ease;
    }

    button.cta:hover:not([disabled]) { background: var(--accent-hover); }
    button.cta:active:not([disabled]) { transform: translateY(1px); }
    button.cta[disabled] { opacity: 0.6; cursor: not-allowed; }

    .status-line {
      color: var(--muted);
      font-size: 12px;
      margin-right: auto;
    }

    .empty, .error {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .error { color: #b91c1c; }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 24px;
    }
  </style>
</head>
<body>
  <header class="banner">
    <h1>wAI Operations Ledger Control Desk</h1>
    <p>Bolna-driven automated dispute resolution &mdash; live ledger view</p>
  </header>

  <main>
    <section class="card" aria-labelledby="ledger-title">
      <h2 id="ledger-title">Active Ledger</h2>
      <p class="subtitle">Outstanding invoices tracked against the dispute-resolution pipeline.</p>

      <table class="grid" id="ledger-grid">
        <thead>
          <tr>
            <th>Client Name</th>
            <th>Invoice ID</th>
            <th>Pending Balance</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="ledger-body">
          <tr><td colspan="4" class="empty">Loading ledger&hellip;</td></tr>
        </tbody>
      </table>

      <div class="actions">
        <span class="status-line" id="status-line"></span>
        <button class="cta" id="trigger-btn">Initiate Outbound Resolution Voice Call</button>
      </div>
    </section>
  </main>

  <footer>wAI Reconcile &middot; Operations Console</footer>

  <script>
    const BACKEND_API_BASE_URL = "https://your-app-name.up.railway.app";

    const ledgerBody = document.getElementById('ledger-body');
    const triggerBtn = document.getElementById('trigger-btn');
    const statusLine = document.getElementById('status-line');

    function renderBadge(status) {
      if (status === 'RESOLVED_COMPLIANCE') {
        return '<span class="badge ok"><span class="dot"></span>Account Settle Cleared</span>';
      }
      return '<span class="badge warn"><span class="dot"></span>Disputed / Outbound Pending</span>';
    }

    function formatBalance(amount) {
      if (typeof amount !== 'number') return '—';
      return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(amount);
    }

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[c]);
    }

    function renderRows(rows) {
      if (!rows || rows.length === 0) {
        ledgerBody.innerHTML = '<tr><td colspan="4" class="empty">No invoices on file.</td></tr>';
        return;
      }
      ledgerBody.innerHTML = rows.map((r) => `
        <tr>
          <td>${escapeHtml(r.clientName)}</td>
          <td>${escapeHtml(r.invoiceId)}</td>
          <td class="balance">${formatBalance(r.balanceDue)}</td>
          <td>${renderBadge(r.status)}</td>
        </tr>
      `).join('');
    }

    function setStatus(msg, isError) {
      statusLine.textContent = msg || '';
      statusLine.style.color = isError ? '#b91c1c' : '';
    }

    async function loadLedger() {
      try {
        const res = await fetch(`${BACKEND_API_BASE_URL}/api/invoice-state`, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const doc = await res.json();
        renderRows([doc]);
        setStatus(`Last refreshed ${new Date().toLocaleTimeString()}`);
      } catch (err) {
        ledgerBody.innerHTML = `<tr><td colspan="4" class="error">Failed to load ledger: ${escapeHtml(err.message)}</td></tr>`;
        setStatus('Backend unreachable. Check BACKEND_API_BASE_URL.', true);
      }
    }

    async function triggerCall() {
      triggerBtn.disabled = true;
      const original = triggerBtn.textContent;
      triggerBtn.textContent = 'Queuing call…';
      try {
        const res = await fetch(`${BACKEND_API_BASE_URL}/api/trigger-call`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ invoiceId: 'INV-2026-89A' }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        setStatus(`Outbound trigger: ${data.status || 'OK'}`);
        setTimeout(loadLedger, 2000);
      } catch (err) {
        setStatus(`Trigger failed: ${err.message}`, true);
      } finally {
        triggerBtn.disabled = false;
        triggerBtn.textContent = original;
      }
    }

    triggerBtn.addEventListener('click', triggerCall);
    loadLedger();
    setInterval(loadLedger, 10000);
  </script>
</body>
</html>
